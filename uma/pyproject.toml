[build-system]
requires = ["setuptools>=61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "umakit"
version = "1.0.0"
description = "VASP-like CLI/TUI interface for FAIRChem UMA models"
requires-python = ">=3.9"
dependencies = [
    "ase>=3.26.0",
    "numpy",
    "tqdm",
    "textual>=0.40.0",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "mypy",
]

[project.scripts]
uma_calc = "umakit.cli:main"

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 88
target-version = "py39"

# GPU compatibility overrides — see `uma_calc doctor` for guidance.
# Pascal GPUs (GTX 10xx, P104-100, P100: CC 6.x) are NOT supported by
# PyTorch 2.7+ with CUDA 12.8. Uncomment ONE of the following to fix:
#
# [tool.uv]
# # Option A: same torch version, older CUDA (may retain sm_6x kernels)
# constraint-dependencies = ["torch==2.8.0+cu124"]
#
# # Option B: downgrade torch (last version with Pascal support)
# override-dependencies = ["torch==2.6.0+cu126"]
